<!DOCTYPE html>
<html>
<head>
    <title>Lab 4 - CSS</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: red;
            font-family: Arial;
        }

        .internal-para {
            font-size: 18px;
            color: brown;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1 style="color: blue; text-align: center;">
        Inline CSS Example
    </h1>

    <p style="color: green; font-size: 18px;">
        This paragraph uses Inline CSS.
    </p>

    <hr>

    <h2>Internal CSS Example</h2>

    <p class="internal-para">
        This paragraph uses Internal CSS.
    </p>

    <hr>

    <h3>External CSS Example</h3>

    <p class="external-para">
        This paragraph uses External CSS.
    </p>

</body>
</html>
